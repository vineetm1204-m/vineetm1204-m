<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
  </defs>

  <style>
    .bg { fill: #000000; }
    .wall-line { stroke: #161616; stroke-width: 1; }
    .white { fill: #ffffff; }
    .lgray  { fill: #c9c9c9; }
    .mgray  { fill: #8a8a8a; }
    .dgray  { fill: #4a4a4a; }
    .xdgray { fill: #262626; }
    .screen { fill: #060606; }
    .accent { fill: #ffffff; }

    @keyframes blink { 0%, 45% { opacity: 1; } 50%, 95% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes typeArmR { 0%, 40% { transform: translateY(0px); } 50% { transform: translateY(5px); } 60%, 100% { transform: translateY(0px); } }
    @keyframes typeArmL { 0%, 40% { transform: translateY(0px); } 50% { transform: translateY(4px); } 60%, 100% { transform: translateY(0px); } }
    @keyframes codeLine1 { 0% { opacity: 0; } 8% { opacity: 1; } 45% { opacity: 1; } 55% { opacity: 0; } 100% { opacity: 0; } }
    @keyframes codeLine2 { 0% { opacity: 0; } 20% { opacity: 0; } 28% { opacity: 1; } 55% { opacity: 1; } 65% { opacity: 0; } 100% { opacity: 0; } }
    @keyframes codeLine3 { 0% { opacity: 0; } 38% { opacity: 0; } 46% { opacity: 1; } 75% { opacity: 1; } 85% { opacity: 0; } 100% { opacity: 0; } }
    @keyframes codeLine4 { 0% { opacity: 0; } 58% { opacity: 0; } 66% { opacity: 1; } 92% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes codeLine5 { 0% { opacity: 0; } 70% { opacity: 0; } 78% { opacity: 1; } 96% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
    @keyframes glow { 0%, 100% { opacity: 0.45; } 50% { opacity: 0.9; } }
    @keyframes steam { 0% { transform: translateY(0px); opacity: 0.8; } 100% { transform: translateY(-14px); opacity: 0; } }
    @keyframes reveal { 0% { opacity: 0; } 5% { opacity: 1; } 100% { opacity: 1; } }
    @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

    .cursor   { animation: blink 1.1s steps(1) infinite; }
    .armR     { animation: typeArmR 0.5s ease-in-out infinite; transform-origin: 170px 168px; }
    .armL     { animation: typeArmL 0.5s ease-in-out infinite 0.25s; transform-origin: 118px 168px; }
    .line1 { animation: codeLine1 5s linear infinite; }
    .line2 { animation: codeLine2 5s linear infinite; }
    .line3 { animation: codeLine3 5s linear infinite; }
    .line4 { animation: codeLine4 5s linear infinite; }
    .line5 { animation: codeLine5 5s linear infinite; }
    .badge  { animation: float 3s ease-in-out infinite; }
    .badge2 { animation: float 3s ease-in-out infinite 0.6s; }
    .badge3 { animation: float 3s ease-in-out infinite 1.2s; }
    .screen-glow { animation: glow 2.4s ease-in-out infinite; }
    .steam1 { animation: steam 2s ease-in infinite; }
    .steam2 { animation: steam 2s ease-in infinite 0.7s; }
    .lamp   { animation: flicker 3.2s ease-in-out infinite; }
    .letter { opacity: 0; animation: reveal 6s steps(1) infinite; }
    .l1{animation-delay:.0s}.l2{animation-delay:.08s}.l3{animation-delay:.16s}.l4{animation-delay:.24s}
    .l5{animation-delay:.32s}.l6{animation-delay:.40s}.l7{animation-delay:.48s}.l8{animation-delay:.56s}
    .l9{animation-delay:.64s}.l10{animation-delay:.72s}.l11{animation-delay:.80s}.l12{animation-delay:.88s}
  </style>

  <rect class="bg" width="900" height="260" rx="10"/>

  <!-- faint room grid -->
  <g opacity="0.6">
    <line class="wall-line" x1="0" y1="30" x2="900" y2="30"/>
    <line class="wall-line" x1="0" y1="60" x2="900" y2="60"/>
    <line class="wall-line" x1="0" y1="205" x2="900" y2="205"/>
  </g>

  <!-- floor -->
  <rect x="0" y="205" width="900" height="55" fill="url(#floorGrad)"/>

  <!-- desk lamp on the shelf -->
  <g class="lamp">
    <rect class="mgray" x="60" y="18" width="6" height="22"/>
    <polygon class="lgray" points="45,18 81,18 70,4 56,4"/>
    <rect class="white" x="60" y="8" width="6" height="6"/>
  </g>

  <!-- desk -->
  <rect class="dgray" x="30" y="188" width="330" height="12" rx="2"/>
  <rect class="xdgray" x="30" y="200" width="330" height="5"/>
  <rect class="xdgray" x="45" y="205" width="12" height="42"/>
  <rect class="xdgray" x="335" y="205" width="12" height="42"/>
  <rect class="dgray" x="35" y="244" width="320" height="6"/>

  <!-- keyboard + mouse -->
  <rect class="dgray" x="150" y="180" width="70" height="10" rx="1"/>
  <rect class="mgray" x="153" y="182" width="64" height="6" opacity="0.5"/>
  <rect class="dgray" x="228" y="182" width="10" height="8" rx="2"/>

  <!-- coffee mug with steam -->
  <g>
    <rect class="lgray" x="70" y="172" width="16" height="16" rx="2"/>
    <rect class="xdgray" x="73" y="176" width="10" height="8"/>
    <rect class="mgray" x="86" y="176" width="5" height="6"/>
    <rect class="mgray steam1" width="2" height="8" x="74" y="160"/>
    <rect class="mgray steam2" width="2" height="8" x="80" y="160"/>
  </g>

  <!-- chair -->
  <rect class="xdgray" x="118" y="196" width="8" height="30"/>
  <rect class="xdgray" x="176" y="196" width="8" height="30"/>
  <rect class="dgray" x="112" y="190" width="80" height="10" rx="2"/>

  <!-- character: chibi coder, sitting -->
  <g>
    <!-- hair -->
    <rect class="xdgray" x="128" y="94" width="36" height="10" rx="2"/>
    <rect class="xdgray" x="124" y="100" width="8" height="14"/>
    <rect class="xdgray" x="160" y="100" width="8" height="14"/>
    <!-- head -->
    <rect class="lgray" x="132" y="104" width="28" height="26" rx="3"/>
    <rect class="xdgray" x="140" y="114" width="4" height="4"/>
    <rect class="xdgray" x="152" y="114" width="4" height="4"/>
    <!-- hoodie torso -->
    <rect class="dgray" x="120" y="130" width="52" height="46" rx="6"/>
    <rect class="mgray" x="140" y="134" width="12" height="10" rx="2"/>
    <!-- legs on stool -->
    <rect class="dgray" x="126" y="176" width="18" height="20" rx="2"/>
    <rect class="dgray" x="148" y="176" width="18" height="20" rx="2"/>
    <rect class="xdgray" x="124" y="192" width="22" height="8" rx="2"/>
    <rect class="xdgray" x="146" y="192" width="22" height="8" rx="2"/>
    <!-- arms typing -->
    <g class="armL">
      <rect class="dgray" x="104" y="140" width="18" height="12" rx="4"/>
      <rect class="lgray" x="100" y="150" width="14" height="10" rx="3"/>
    </g>
    <g class="armR">
      <rect class="dgray" x="170" y="140" width="18" height="12" rx="4"/>
      <rect class="lgray" x="176" y="150" width="14" height="10" rx="3"/>
    </g>
  </g>

  <!-- monitor -->
  <rect class="xdgray" x="255" y="188" width="30" height="10"/>
  <rect class="dgray" x="235" y="196" width="70" height="8" rx="2"/>
  <g class="screen-glow">
    <rect class="mgray" x="215" y="48" width="150" height="132" rx="6"/>
  </g>
  <rect class="screen" x="223" y="56" width="134" height="116" rx="4"/>

  <!-- animated terminal code inside monitor -->
  <rect class="white line1" x="233" y="68"  width="60" height="6"/>
  <rect class="mgray line2" x="233" y="82"  width="90" height="6"/>
  <rect class="white line3" x="233" y="96"  width="45" height="6"/>
  <rect class="mgray line4" x="233" y="110" width="75" height="6"/>
  <rect class="white line5" x="233" y="124" width="55" height="6"/>
  <rect class="white cursor" x="233" y="138" width="10" height="10"/>

  <!-- floating tech badges -->
  <g class="badge">
    <rect class="white" x="410" y="60" width="14" height="14"/>
    <text x="430" y="72" fill="#ffffff" font-size="14">React</text>
  </g>
  <g class="badge2">
    <rect class="white" x="410" y="98" width="14" height="14"/>
    <text x="430" y="110" fill="#ffffff" font-size="14">Python</text>
  </g>
  <g class="badge3">
    <rect class="white" x="410" y="136" width="14" height="14"/>
    <text x="430" y="148" fill="#ffffff" font-size="14">JavaScript</text>
  </g>

  <!-- pixel letter reveal: name -->
  <g font-size="28" letter-spacing="4" font-weight="bold">
    <text class="letter l1"  x="530" y="90"  fill="#ffffff">V</text>
    <text class="letter l2"  x="557" y="90"  fill="#ffffff">I</text>
    <text class="letter l3"  x="573" y="90"  fill="#ffffff">N</text>
    <text class="letter l4"  x="600" y="90"  fill="#ffffff">E</text>
    <text class="letter l5"  x="624" y="90"  fill="#ffffff">E</text>
    <text class="letter l6"  x="648" y="90"  fill="#ffffff">T</text>
    <text class="letter l7"  x="686" y="90"  fill="#ffffff">M</text>
    <text class="letter l8"  x="718" y="90"  fill="#ffffff">I</text>
    <text class="letter l9"  x="734" y="90"  fill="#ffffff">T</text>
    <text class="letter l10" x="756" y="90"  fill="#ffffff">T</text>
    <text class="letter l11" x="778" y="90"  fill="#ffffff">A</text>
    <text class="letter l12" x="802" y="90"  fill="#ffffff">L</text>
  </g>

  <text x="530" y="122" fill="#999999" font-size="15">&gt; frontend_dev.build() &amp;&amp; ml.train()</text>
  <text x="530" y="146" fill="#5f5f5f" font-size="13">while(alive) { learn(); code(); repeat(); }</text>
  <rect class="white cursor" x="530" y="156" width="10" height="14"/>
</svg>
